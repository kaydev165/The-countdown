<h1>🎄 До Нового года осталось 🎄</h1>

<div class="countdown">

    <div class="box">
        <span id="days">0</span>
        <p>Дней</p>
    </div>

    <div class="box">
        <span id="hours">00</span>
        <p>Часов</p>
    </div>

    <div class="box">
        <span id="minutes">00</span>
        <p>Минут</p>
    </div>

    <div class="box">
        <span id="seconds">00</span>
        <p>Секунд</p>
    </div>

</div>

<h2 id="message"></h2>
