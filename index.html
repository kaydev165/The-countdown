<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="snow"></div>

<div class="container">

    <h1 id="title">🎄 До Нового года осталось</h1>

    <div class="buttons">
        <button id="newYearBtn" class="active">
            🎄 Новый год
        </button>

        <button id="birthdayBtn">
            🎂 День рождения
        </button>
    </div>

    <div id="birthdayForm" class="hidden">

        <h2>Введите дату рождения</h2>

        <input
            type="date"
            id="birthdayInput">

        <button id="saveBirthday">
            💾 Сохранить
        </button>

    </div>

    <div class="countdown">

        <div class="box">
            <span id="days">0</span>
            <p>Дней</p>
        </div>

        <div class="box">
            <span id="hours">0</span>
            <p>Часов</p>
        </div>

        <div class="box">
            <span id="minutes">0</span>
            <p>Минут</p>
        </div>

        <div class="box">
            <span id="seconds">0</span>
            <p>Секунд</p>
        </div>

    </div>

    <h2 id="message"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
