<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎄 До Нового года 🎄</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="snow"></div>

    <div class="container">
        <h1>🎄 До Нового года осталось 🎄</h1>

        <div class="countdown">

            <div class="box">
                <span id="days">0</span>
                <p>Дней</p>
            </div>

            <div class="box">
                <span id="hours">0</span>
                <p>Часов</p>
            </div>

            <div class="box">
                <span id="minutes">0</span>
                <p>Минут</p>
            </div>

            <div class="box">
                <span id="seconds">0</span>
                <p>Секунд</p>
            </div>

        </div>

        <h2 id="message"></h2>
    </div>

    <script src="script.js"></script>

</body>
</html>
<div class="event-buttons">
    <button id="birthdayBtn">🎂 День рождения</button>
</div>

<div id="birthdayForm" style="display:none;">
    <h3>Введите дату рождения</h3>
    <input type="date" id="birthday">
    <button id="saveBirthday">Сохранить</button>
</div>

<h2 id="title">До Нового года осталось</h2>

<div id="countdown">

</div>
